global:
  scrape_interval: 30s

scrape_configs:
  - job_name: "node"
    static_configs:
      - targets:
          - "node_exporter:9100"

  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"
  - job_name: "dex"
    static_configs:
      - targets:
          - 'dex:8080'
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"
rule_files:
  - "/etc/prometheus/rules.yml"
